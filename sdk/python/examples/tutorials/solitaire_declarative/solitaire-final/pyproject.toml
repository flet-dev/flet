[project]
name = "tutorials-solitaire-declarative-solitaire-final"
version = "1.0.0"
description = "Builds a declarative Solitaire game with stackable slots, drag-and-drop piles, and win detection."
requires-python = ">=3.10"
keywords = ["tutorials", "solitaire", "declarative", "game", "drag and drop"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Games", "Apps/Declarative"]

[tool.flet.metadata]
title = "Solitaire"
controls = ["Stack", "Container", "GestureDetector", "Image", "Column", "Row", "FilledButton", "AlertDialog"]
layout_pattern = "center-stage"
complexity = "advanced"
features = ["drag and drop", "game state", "stacking piles", "win detection"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
