[project]
name = "services-clipboard-text"
version = "1.0.0"
description = "Copies text to the clipboard and reads the current clipboard text back into the app."
requires-python = ">=3.10"
keywords = ["clipboard", "text", "services", "async"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Services/Clipboard"]

[tool.flet.metadata]
title = "Clipboard text"
controls = ["SafeArea", "Column", "Page", "Clipboard", "Text", "TextField", "Button"]
layout_pattern = "inline-actions"
complexity = "basic"
features = ["copy text", "read clipboard"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
