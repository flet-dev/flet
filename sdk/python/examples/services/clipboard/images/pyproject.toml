[project]
name = "services-clipboard-images"
version = "1.0.0"
description = "Copies a sample image to the clipboard and previews image data loaded from the clipboard."
requires-python = ">=3.10"
keywords = ["clipboard", "images", "services", "async"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Services/Clipboard"]

[tool.flet.metadata]
title = "Clipboard images"
controls = ["SafeArea", "Column", "Page", "Button", "Clipboard", "Image", "Text", "Container"]
layout_pattern = "inline-actions"
complexity = "basic"
features = ["copy image", "clipboard image preview"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
