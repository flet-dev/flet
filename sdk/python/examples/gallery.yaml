# Curated catalog for the Flet gallery.
#
# Top-level `categories:` is a map of name -> entry. An entry is either
# `null` (bare name, no metadata, no children) or a map. Inside an
# entry, `_`-prefixed keys are metadata (`_icon`, `_description`); all
# other keys are child categories with the same recursive shape.
#
# Insertion order = display order. Slugs are derived from names.
# Examples whose `[tool.flet.gallery].categories` reference a path not
# in this file will be skipped at scan time.

