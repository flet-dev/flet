[project]
name = "apps-routing-navigation-pop-view-confirm"
version = "1.0.0"
description = "Confirms whether a view is allowed to pop before returning from the store route."
requires-python = ">=3.10"
keywords = ["apps", "routing", "navigation", "confirmation dialog", "view pop"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Apps/Navigation"]

[tool.flet.metadata]
title = "Pop view confirm"
controls = ["View", "SafeArea", "Column", "AppBar", "Button", "AlertDialog", "TextButton", "Text"]
layout_pattern = "list-detail"
complexity = "basic"
features = ["routing", "confirmation dialog", "back navigation"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
