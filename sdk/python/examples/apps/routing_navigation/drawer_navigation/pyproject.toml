[project]
name = "apps-routing-navigation-drawer-navigation"
version = "1.0.0"
description = "Connects a navigation drawer to route changes across home, store, and about views."
requires-python = ">=3.10"
keywords = ["apps", "routing", "navigation drawer", "views", "destinations"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Apps/Navigation"]

[tool.flet.metadata]
title = "Drawer navigation"
controls = ["View", "SafeArea", "Column", "AppBar", "NavigationDrawer", "NavigationDrawerDestination", "Button", "Text"]
layout_pattern = "list-detail"
complexity = "basic"
features = ["routing", "drawer navigation", "back navigation"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
