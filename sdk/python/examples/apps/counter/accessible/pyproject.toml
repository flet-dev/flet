[project]
name = "apps-counter-accessible"
version = "1.0.0"
description = "Accessible counter app with semantics labels and a keyboard shortcut for the semantics debugger."
requires-python = ">=3.10"
keywords = ["apps", "counter", "accessibility", "semantics", "keyboard"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Apps/Accessibility"]

[tool.flet.metadata]
title = "Accessible counter"
controls = ["SafeArea", "Column", "Row", "IconButton", "TextField", "Semantics", "Text"]
layout_pattern = "inline-actions"
complexity = "basic"
features = ["accessible semantics", "keyboard shortcut", "counter updates"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
