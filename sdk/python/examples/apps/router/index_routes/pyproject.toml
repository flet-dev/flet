[project]
name = "router-index-routes"
version = "1.0.0"
description = "Index routes that render default content when parent path matches without a sub-path."
requires-python = ">=3.10"
keywords = ["router", "index", "default", "routes"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Navigation/Router"]

[tool.flet.metadata]
title = "Index routes"
controls = ["SafeArea", "Column", "Row", "Button", "Text", "Divider", "Router", "Route"]
layout_pattern = "page-navigation"
complexity = "basic"
features = ["index routes", "default child routes"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
