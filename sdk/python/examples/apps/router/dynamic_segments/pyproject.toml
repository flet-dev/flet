[project]
name = "router-dynamic-segments"
version = "1.0.0"
description = "Dynamic route segments with use_route_params() to extract URL parameters like :userId and :postId."
requires-python = ">=3.10"
keywords = ["router", "dynamic", "params", "segments"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Navigation/Router"]

[tool.flet.metadata]
title = "Dynamic segments"
controls = ["SafeArea", "Column", "Button", "Text", "Router", "Route"]
layout_pattern = "page-navigation"
complexity = "basic"
features = ["dynamic segments", "use_route_params", "nested params"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
