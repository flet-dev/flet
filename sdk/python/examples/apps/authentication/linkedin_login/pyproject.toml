[project]
name = "apps-authentication-linkedin-login"
version = "1.0.0"
description = "Authenticates with a custom LinkedIn OAuth provider and displays the token and user ID."
requires-python = ">=3.10"
keywords = ["apps", "authentication", "linkedin", "oauth", "login", "async"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Apps/Authentication"]

[tool.flet.metadata]
title = "LinkedIn login"
controls = ["SafeArea", "Column", "Button", "Text", "OAuthProvider"]
layout_pattern = "inline-actions"
complexity = "basic"
features = ["custom oauth provider", "access token display"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
