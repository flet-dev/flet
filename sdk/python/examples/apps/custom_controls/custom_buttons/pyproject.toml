[project]
name = "apps-custom-controls-custom-buttons"
version = "1.0.0"
description = "Shows three ways to define reusable custom button controls with predefined styling."
requires-python = ">=3.10"
keywords = ["apps", "custom controls", "buttons", "control decorator", "dataclass"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Apps/Custom controls"]

[tool.flet.metadata]
title = "Custom buttons"
controls = ["SafeArea", "Column", "Row", "Button"]
layout_pattern = "inline-actions"
complexity = "basic"
features = ["custom controls", "button styling"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
