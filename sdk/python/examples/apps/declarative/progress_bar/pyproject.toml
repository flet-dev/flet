[project]
name = "apps-declarative-progress-bar"
version = "1.0.0"
description = "Runs an async counter that fills a progress bar over time in a declarative app."
requires-python = ">=3.10"
keywords = ["apps", "declarative", "progress bar", "async", "state"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Apps/Declarative"]

[tool.flet.metadata]
title = "Progress bar"
controls = ["SafeArea", "Column", "ProgressBar", "Button"]
layout_pattern = "inline-actions"
complexity = "basic"
features = ["async", "progress updates"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
