[project]
name = "apps-declarative-counter-minimal"
version = "1.0.0"
description = "Small declarative counter showing the minimum state hook pattern for updating text."
requires-python = ">=3.10"
keywords = ["apps", "declarative", "counter", "minimal", "state hooks"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Apps/Declarative"]

[tool.flet.metadata]
title = "Counter minimal"
controls = ["SafeArea", "Row", "Text", "Button"]
layout_pattern = "inline-actions"
complexity = "basic"
features = ["counter updates"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
