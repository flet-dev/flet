[project]
name = "apps-declarative-use-dialog-basic"
version = "1.0.0"
description = "Single declarative AlertDialog driven by `use_dialog` with an async delete and loading state."
requires-python = ">=3.10"
keywords = ["apps", "declarative", "dialog", "use_dialog", "async"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Apps/Declarative"]

[tool.flet.metadata]
title = "Use dialog basic"
controls = ["Column", "Text", "Button", "TextButton", "AlertDialog"]
layout_pattern = "inline-actions"
complexity = "basic"
features = ["dialog management", "use_dialog", "async", "loading state"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
