[project]
name = "layout-control-matrix4-transform"
version = "1.0.0"
description = "Demonstrates Matrix4 perspective, skew, mirror, and chained transforms on cards."
requires-python = ">=3.10"
keywords = ["layout control", "matrix4", "transform", "perspective", "skew"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Layout/LayoutControl"]

[tool.flet.metadata]
title = "Matrix4 Transform"
controls = ["SafeArea", "Column", "ResponsiveRow", "Container", "Text", "Transform", "Matrix4"]
layout_pattern = "comparison"
complexity = "basic"
features = ["perspective transform", "skew and rotation", "matrix multiply chain"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
