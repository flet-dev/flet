[project]
name = "cupertino-segmented-button-basic"
version = "1.0.0"
description = "Shows a CupertinoSegmentedButton with mixed segment content sizes and selection events."
requires-python = ">=3.10"
keywords = ["cupertino", "segmented button", "selection", "buttons"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Buttons/CupertinoSegmentedButton"]

[tool.flet.metadata]
title = "Basic"
controls = ["SafeArea", "CupertinoSegmentedButton", "Container", "Text"]
layout_pattern = "single-panel"
complexity = "basic"
features = ["segment selection callback", "custom segment padding", "selected color"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
