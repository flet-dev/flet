[project]
name = "page-keyboard-events"
version = "1.0.0"
description = "Demonstrates live updates from page keyboard events and modifier keys."
requires-python = ">=3.10"
keywords = ["page", "keyboard", "keyboard event", "shortcut", "modifier keys"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Pages/Page"]

[tool.flet.metadata]
title = "Keyboard events"
controls = ["SafeArea", "Column", "Row", "Container", "Text"]
layout_pattern = "single-panel"
complexity = "basic"
features = ["keyboard input handling", "modifier keys display"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
