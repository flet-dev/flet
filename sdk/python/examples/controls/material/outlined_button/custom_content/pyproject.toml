[project]
name = "outlined-button-custom-content"
version = "1.0.0"
description = "Demonstrates OutlinedButtons with custom content and icon/text composition."
requires-python = ">=3.10"
keywords = ["outlined button", "custom content", "compound button", "button"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Buttons/OutlinedButton"]

[tool.flet.metadata]
title = "Custom content"
controls = ["SafeArea", "OutlinedButton", "Row", "Column", "Icon", "Container", "Text"]
layout_pattern = "inline-actions"
complexity = "basic"
features = ["custom button content", "compound layout"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
