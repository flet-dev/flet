[project]
name = "snack-bar-counter"
version = "1.0.0"
description = "Count repeated SnackBar opens and support undoing the latest increment."
requires-python = ">=3.10"
keywords = ["snackbar", "counter", "undo", "feedback"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Dialogs/SnackBar"]

[tool.flet.metadata]
title = "SnackBar counter"
controls = ["SnackBar", "Button", "Text", "SafeArea"]
layout_pattern = "inline-actions"
complexity = "basic"
features = ["counter updates", "undo action"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
