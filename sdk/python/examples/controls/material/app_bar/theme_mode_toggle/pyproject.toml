[project]
name = "app-bar-theme-mode-toggle"
version = "1.0.0"
description = "AppBar example with theme mode toggle and popup menu actions."
requires-python = ">=3.10"
keywords = ["appbar", "navigation", "theme mode", "popup menu"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Navigation/AppBar"]

[tool.flet.metadata]
title = "Theme mode toggle"
controls = ["AppBar", "Icon", "IconButton", "PopupMenuButton", "PopupMenuItem", "SafeArea", "Column", "Text", "Button", "Theme"]
layout_pattern = "toolbar-actions"
complexity = "basic"
features = ["theme mode toggle", "popup menu interactions"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
