[project]
name = "button-animate-on-hover"
version = "1.0.0"
description = "Animated button rotation on hover with click and long-press actions."
requires-python = ">=3.10"
keywords = ["button", "hover", "animation", "click", "long press"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Buttons/Button"]

[tool.flet.metadata]
title = "Animate on hover"
controls = ["SafeArea", "Column", "Button", "Text"]
layout_pattern = "inline-actions"
complexity = "basic"
features = ["hover animation", "click handling", "long press handling"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
