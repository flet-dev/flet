[project]
name = "date-range-picker-custom-locale"
version = "1.0.0"
description = "Opens DateRangePicker with zh_Hans locale for localized date range selection."
requires-python = ">=3.10"
keywords = ["date range picker", "custom locale", "locale", "internationalization", "zh_Hans"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Dialogs/DateRangePicker"]

[tool.flet.metadata]
title = "Custom locale"
controls = ["SafeArea", "Button", "DateRangePicker", "Locale"]
layout_pattern = "single-panel"
complexity = "basic"
features = ["localized date range picker", "dialog open action"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
