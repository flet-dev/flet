[project]
name = "chip-filter-chips"
version = "1.0.0"
description = "Filter chips for amenity selection with on_select events."
requires-python = ">=3.10"
keywords = ["chip", "filter chip", "material", "input", "selection", "filters"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Input/Chip"]

[tool.flet.metadata]
title = "Filter chips"
docs_intro = """
Filter chips are chips with [`on_select`](chip.md#flet.Chip.on_select) event specified.

They use tags or descriptive words provided in the [`label`](chip.md#flet.Chip.label) to filter content. They can be a good alternative to switches or checkboxes."""
controls = ["SafeArea", "Column", "Row", "Chip", "Icon", "Text"]
layout_pattern = "filter-bar"
complexity = "basic"
features = ["selection handling", "chip toggles", "event-driven filtering UI"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
