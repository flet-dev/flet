[project]
name = "range-slider-handling-change-events"
version = "1.0.0"
description = "Shows event callbacks for RangeSlider value changes."
requires-python = ">=3.10"
keywords = ["range slider", "events", "on_change", "async", "input controls"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Input/RangeSlider"]

[tool.flet.metadata]
title = "Handling Change Events"
controls = ["RangeSlider", "SafeArea", "Text", "Column", "Container"]
layout_pattern = "input-panel"
complexity = "basic"
features = ["range change events", "callback updates", "scrollable content"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
