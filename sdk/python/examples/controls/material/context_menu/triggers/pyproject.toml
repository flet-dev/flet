[project]
name = "context-menu-triggers"
version = "1.0.0"
description = "ContextMenu trigger demo with separate primary, secondary, and tertiary click actions."
requires-python = ">=3.10"
keywords = ["context menu", "triggers", "popup menu", "mouse buttons"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Input/ContextMenu"]

[tool.flet.metadata]
title = "Triggers"
controls = ["SafeArea", "ContextMenu", "PopupMenuItem", "Container", "Text", "SnackBar"]
layout_pattern = "single-panel"
complexity = "basic"
features = ["multi-trigger menus", "item selection callback", "dismiss callback"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
