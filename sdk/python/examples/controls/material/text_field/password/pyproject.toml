[project]
name = "text-field-password"
version = "1.0.0"
description = "Shows a password TextField with a built-in reveal button."
requires-python = ">=3.10"
keywords = ["text field", "password", "secure input", "reveal", "input"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Input/TextField"]

[tool.flet.metadata]
title = "Password with reveal button"
controls = ["SafeArea", "TextField"]
layout_pattern = "single-panel"
complexity = "basic"
features = ["password reveal"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
