[project]
name = "card-music-info"
version = "1.0.0"
description = "Card with music info and action buttons."
requires-python = ">=3.10"
keywords = ["card", "listtile", "actions", "material"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Layout/Card"]

[tool.flet.metadata]
title = "Music info"
controls = ["SafeArea", "Card", "Container", "Column", "ListTile", "Row", "TextButton"]
layout_pattern = "inline-actions"
complexity = "basic"
features = ["card layout", "action buttons"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
