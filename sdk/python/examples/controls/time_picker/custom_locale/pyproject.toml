[project]
name = "time-picker-custom-locale"
version = "1.0.0"
description = "Opens a TimePicker dialog using a custom zh_Hans locale."
requires-python = ">=3.10"
keywords = ["time picker", "locale", "dialog", "internationalization", "button"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Dialogs/TimePicker"]

[tool.flet.metadata]
title = "Custom locale"
controls = ["SafeArea", "Button", "TimePicker"]
layout_pattern = "single-panel"
complexity = "basic"
features = ["custom locale"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
