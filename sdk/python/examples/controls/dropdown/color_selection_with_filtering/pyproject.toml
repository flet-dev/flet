[project]
name = "dropdown-color-selection-with-filtering"
version = "1.0.0"
description = "Filters editable dropdown options by color and applies selected color to the control text."
requires-python = ">=3.10"
keywords = ["dropdown", "filter", "editable", "selection", "color"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Input/Dropdown"]

[tool.flet.metadata]
title = "Color selection with filtering"
controls = ["SafeArea", "Dropdown", "DropdownOption", "Text"]
layout_pattern = "form"
complexity = "basic"
features = ["editable dropdown", "option filtering", "selection callback"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
