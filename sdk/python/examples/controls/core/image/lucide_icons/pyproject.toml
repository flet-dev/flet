[project]
name = "image-lucide-icons"
version = "1.0.0"
description = "Shows Lucide SVG icons rendered through Image with custom colors."
requires-python = ">=3.10"
keywords = ["image", "lucide", "svg icons", "inline svg"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Displays/Image"]

[tool.flet.metadata]
title = "Displaying a Lucide icon"
controls = ["SafeArea", "Row", "Image"]
layout_pattern = "single-panel"
complexity = "basic"
features = ["inline svg icons", "icon color styling"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
