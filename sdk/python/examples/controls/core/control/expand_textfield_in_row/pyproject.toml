[project]
name = "control-expand-textfield-in-row"
version = "1.0.0"
description = "Row layout with an expanding TextField and fixed-size action button."
requires-python = ">=3.10"
keywords = ["control", "expand", "row", "textfield", "layout"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Layout/Control"]

[tool.flet.metadata]
title = "Expand textfield in row"
controls = ["SafeArea", "Container", "Row", "TextField", "Button"]
layout_pattern = "inline-actions"
complexity = "basic"
features = ["expand in row", "mixed flexible and fixed controls"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
