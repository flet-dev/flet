[project]
name = "control-expand-row-equal-split"
version = "1.0.0"
description = "Row example where two containers equally split available horizontal space with expand=True."
requires-python = ">=3.10"
keywords = ["control", "expand", "row", "equal split", "layout"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Layout/Control"]

[tool.flet.metadata]
title = "Expand row equal split"
controls = ["SafeArea", "Container", "Row", "Text"]
layout_pattern = "single-panel"
complexity = "basic"
features = ["equal expand split", "row layout"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
