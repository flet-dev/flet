[project]
name = "layout-control-image-slideshow"
version = "1.0.0"
description = "Slides two images horizontally using animated left position changes."
requires-python = ">=3.10"
keywords = ["layout control", "image slideshow", "animate position", "stack"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Layout/LayoutControl"]

[tool.flet.metadata]
title = "Image slideshow"
controls = ["SafeArea", "Column", "Stack", "Image", "Button", "Animation"]
layout_pattern = "single-panel"
complexity = "basic"
features = ["sliding images", "position animation"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
