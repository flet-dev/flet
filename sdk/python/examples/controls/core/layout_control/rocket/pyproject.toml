[project]
name = "layout-control-rocket"
version = "1.0.0"
description = "Launch animation combining rotation, scale, and opacity on a rocket icon."
requires-python = ">=3.10"
keywords = ["layout control", "rocket", "rotation", "scale", "opacity"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Layout/LayoutControl"]

[tool.flet.metadata]
title = "Rocket"
controls = ["SafeArea", "Column", "Container", "Icon", "Button", "Rotate", "Animation"]
layout_pattern = "single-panel"
complexity = "basic"
features = ["combined transform animation", "icon launch effect"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
