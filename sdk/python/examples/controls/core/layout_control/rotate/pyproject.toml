[project]
name = "layout-control-rotate"
version = "1.0.0"
description = "Applies a fixed rotation transform to a container using Rotate."
requires-python = ">=3.10"
keywords = ["layout control", "rotate", "transform", "container"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Layout/LayoutControl"]

[tool.flet.metadata]
title = "Rotate"
controls = ["SafeArea", "Container", "Text", "Rotate"]
layout_pattern = "single-panel"
complexity = "basic"
features = ["static rotation transform"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
