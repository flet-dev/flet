[project]
name = "layout-control-animate-position"
version = "1.0.0"
description = "Animates top/left positions of multiple containers inside a Stack."
requires-python = ">=3.10"
keywords = ["layout control", "animate position", "stack", "container"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Layout/LayoutControl"]

[tool.flet.metadata]
title = "Animate position"
controls = ["SafeArea", "Column", "Stack", "Container", "Button"]
layout_pattern = "single-panel"
complexity = "basic"
features = ["position animation", "multi-control movement"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
