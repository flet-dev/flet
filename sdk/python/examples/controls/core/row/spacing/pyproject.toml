[project]
name = "row-spacing"
version = "1.0.0"
description = "Adjust row spacing interactively with a slider."
requires-python = ">=3.10"
keywords = ["row", "layout", "spacing", "slider", "interactive"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Layout/Row"]

[tool.flet.metadata]
title = "Row spacing"
controls = ["Column", "Row", "Container", "Text", "Slider"]
layout_pattern = "control-panel"
complexity = "basic"
features = ["slider-driven spacing", "dynamic layout updates"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
