[project]
name = "container-animate-1"
version = "1.0.0"
description = "Animated container size and color transitions triggered by button clicks."
requires-python = ">=3.10"
keywords = ["container", "layout", "flet"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Layout/Container"]

[tool.flet.metadata]
title = "Animate 1"
controls = ["SafeArea", "Column", "Container", "Button"]
layout_pattern = "inline-actions"
complexity = "basic"
features = ["size animation", "color animation"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
