[project]
name = "container-handling-clicks"
version = "1.0.0"
description = "Container gesture handling demo with click, tap-down, and long-press counters."
requires-python = ">=3.10"
keywords = ["container", "layout", "flet"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Layout/Container"]

[tool.flet.metadata]
title = "Handling clicks"
controls = ["SafeArea", "Column", "Container", "Text", "TextSpan"]
layout_pattern = "single-panel"
complexity = "basic"
features = ["on_click", "on_tap_down", "on_long_press"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
