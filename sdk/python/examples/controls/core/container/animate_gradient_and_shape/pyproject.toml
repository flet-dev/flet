[project]
name = "container-animate-gradient-and-shape"
version = "1.0.0"
description = "Animated container with gradient, border, alignment, and shape transitions."
requires-python = ">=3.10"
keywords = ["container", "layout", "flet"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Layout/Container"]

[tool.flet.metadata]
title = "Animate gradient and shape"
controls = ["SafeArea", "Column", "Container", "Button", "Text"]
layout_pattern = "inline-actions"
complexity = "basic"
features = ["gradient animation", "border animation", "alignment animation"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
