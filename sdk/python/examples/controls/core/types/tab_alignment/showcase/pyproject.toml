[project]
name = "types-tab-alignment-showcase"
version = "1.0.0"
description = "Compares Tab Alignment values by applying them to a live control preview."
requires-python = ">=3.10"
keywords = ["tab alignment", "showcase"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Utility/Types", "Navigation/Tabs"]

[tool.flet.metadata]
title = "Tab Alignment showcase"
controls = ["SafeArea", "Column", "Container", "TabBar", "Tab", "TabBarView", "Text", "Tabs"]
layout_pattern = "gallery"
complexity = "basic"
features = ["enum comparison", "live preview"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
