[project]
name = "types-cupertino-button-size-showcase"
version = "1.0.0"
description = "Compares Cupertino Button Size values by applying them to a live control preview."
requires-python = ">=3.10"
keywords = ["cupertino button size", "showcase"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Utility/Types", "Layout/Container"]

[tool.flet.metadata]
title = "Cupertino Button Size showcase"
controls = ["SafeArea", "Column", "Container", "Text", "CupertinoButton", "CupertinoIcons", "AppBar", "Row"]
layout_pattern = "gallery"
complexity = "basic"
features = ["enum comparison", "live preview"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
