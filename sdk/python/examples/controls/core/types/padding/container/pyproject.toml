[project]
name = "types-padding-container"
version = "1.0.0"
description = "Demonstrates how Padding values change container presentation and layout."
requires-python = ">=3.10"
keywords = ["padding", "container"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Utility/Types", "Layout/Container"]

[tool.flet.metadata]
title = "Padding"
controls = ["SafeArea", "Column", "Row", "Container", "Button"]
layout_pattern = "inline-actions"
complexity = "basic"
features = ["padding preview"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
