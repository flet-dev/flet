[project]
name = "types-snack-bar-behavior-showcase"
version = "1.0.0"
description = "Compares Snack Bar Behavior values by applying them to a live control preview."
requires-python = ">=3.10"
keywords = ["snack bar behavior", "showcase"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Utility/Types", "Layout/Container"]

[tool.flet.metadata]
title = "Snack Bar Behavior showcase"
controls = ["SafeArea", "Column", "SnackBar", "Text", "Margin", "SnackBarAction", "Container", "Button"]
layout_pattern = "gallery"
complexity = "basic"
features = ["enum comparison", "live preview"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
