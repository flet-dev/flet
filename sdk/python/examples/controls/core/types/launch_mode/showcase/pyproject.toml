[project]
name = "types-launch-mode-showcase"
version = "1.0.0"
description = "Compares Launch Mode values by applying them to a live control preview."
requires-python = ">=3.10"
keywords = ["launch mode", "showcase", "async"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Utility/Types", "Layout/Container"]

[tool.flet.metadata]
title = "Launch Mode showcase"
controls = ["SafeArea", "Column", "UrlLauncher", "Container", "Text", "Button", "AppBar", "Row"]
layout_pattern = "gallery"
complexity = "basic"
features = ["enum comparison", "live preview"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
