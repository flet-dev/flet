[project]
name = "types-label-position-showcase"
version = "1.0.0"
description = "Compares Label Position values by applying them to a live control preview."
requires-python = ">=3.10"
keywords = ["label position", "showcase"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Utility/Types", "Layout/Container"]

[tool.flet.metadata]
title = "Label Position showcase"
controls = ["SafeArea", "Column", "Container", "Text", "Checkbox", "RadioGroup", "Row", "Radio"]
layout_pattern = "gallery"
complexity = "basic"
features = ["enum comparison", "live preview"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
