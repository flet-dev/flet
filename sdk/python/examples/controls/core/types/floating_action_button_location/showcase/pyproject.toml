[project]
name = "types-floating-action-button-location-showcase"
version = "1.0.0"
description = "Compares Floating Action Button Location values by applying them to a live control preview."
requires-python = ">=3.10"
keywords = ["floating action button location", "showcase"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Utility/Types", "Layout/Container"]

[tool.flet.metadata]
title = "Floating Action Button Location showcase"
controls = ["SafeArea", "Column", "Container", "Text", "Pagelet", "AppBar", "BottomAppBar", "FloatingActionButton"]
layout_pattern = "gallery"
complexity = "basic"
features = ["enum comparison", "live preview"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
