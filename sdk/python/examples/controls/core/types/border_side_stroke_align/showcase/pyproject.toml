[project]
name = "types-border-side-stroke-align-showcase"
version = "1.0.0"
description = "Compares Border Side Stroke Align values by applying them to a live control preview."
requires-python = ">=3.10"
keywords = ["border side stroke align", "showcase"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Utility/Types", "Layout/Container"]

[tool.flet.metadata]
title = "Border Side Stroke Align showcase"
controls = ["SafeArea", "Column", "BorderSideStrokeAlign", "Container", "Stack", "Text", "Page", "AppBar"]
layout_pattern = "gallery"
complexity = "basic"
features = ["enum comparison", "live preview"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
