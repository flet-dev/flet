[project]
name = "types-list-tile-title-alignment-showcase"
version = "1.0.0"
description = "Compares List Tile Title Alignment values by applying them to a live control preview."
requires-python = ">=3.10"
keywords = ["list tile title alignment", "showcase"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Utility/Types", "Layout/Container"]

[tool.flet.metadata]
title = "List Tile Title Alignment showcase"
controls = ["SafeArea", "Column", "Container", "Text", "ListTile", "CircleAvatar", "Icon", "AppBar"]
layout_pattern = "gallery"
complexity = "basic"
features = ["enum comparison", "live preview"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
