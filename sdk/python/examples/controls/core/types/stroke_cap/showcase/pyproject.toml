[project]
name = "types-stroke-cap-showcase"
version = "1.0.0"
description = "Compares Stroke Cap values by applying them to a live control preview."
requires-python = ">=3.10"
keywords = ["stroke cap", "showcase"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Utility/Types", "Canvas/Shapes"]

[tool.flet.metadata]
title = "Stroke Cap showcase"
controls = ["SafeArea", "Column", "Container", "Text", "Canvas", "Line", "AppBar", "Row"]
layout_pattern = "gallery"
complexity = "basic"
features = ["enum comparison", "live preview"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
