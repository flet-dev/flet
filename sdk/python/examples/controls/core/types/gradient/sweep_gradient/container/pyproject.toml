[project]
name = "types-gradient-sweep-gradient-container"
version = "1.0.0"
description = "Demonstrates how Sweep Gradient values change container presentation and layout."
requires-python = ">=3.10"
keywords = ["gradient", "sweep gradient", "container"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Utility/Types", "Layout/Container"]

[tool.flet.metadata]
title = "Sweep Gradient"
controls = ["SafeArea", "Column", "Container", "BorderRadius"]
layout_pattern = "inline-actions"
complexity = "basic"
features = ["sweep gradient preview"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
