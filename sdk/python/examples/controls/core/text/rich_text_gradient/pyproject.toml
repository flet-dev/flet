[project]
name = "text-rich-text-gradient"
version = "1.0.0"
description = "Applies a linear gradient paint to rich text for a multicolor title."
requires-python = ">=3.10"
keywords = ["text", "rich text", "gradient", "paint", "styling"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Display/Text"]

[tool.flet.metadata]
title = "Rich text gradient"
controls = ["SafeArea", "Text", "TextSpan"]
layout_pattern = "single-panel"
complexity = "basic"
features = ["gradient text effect"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
