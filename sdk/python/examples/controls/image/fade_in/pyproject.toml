[project]
name = "image-fade-in"
version = "1.0.0"
description = "Loads random network images with placeholder and fade-in animations."
requires-python = ">=3.10"
keywords = ["image", "fade in", "placeholder", "animation", "network"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Displays/Image"]

[tool.flet.metadata]
title = "Fade-in images with a placeholder"
controls = ["SafeArea", "Column", "Image", "Button", "Animation", "Duration"]
layout_pattern = "single-panel"
complexity = "basic"
features = ["placeholder image", "fade-in animation", "dynamic image source"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
