[project]
name = "charts-radar-chart-example-1"
version = "1.0.0"
description = "Radar chart comparing platform values across multiple datasets with styled titles and ticks."
requires-python = ">=3.10"
keywords = ["charts", "radar-chart", "flet"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet", "flet-charts"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Charts/RadarChart"]

[tool.flet.metadata]
title = "Example 1"
controls = ["SafeArea", "RadarChart"]
layout_pattern = "single-chart"
complexity = "basic"
features = ["chart visualization"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
