[project]
name = "charts-scatter-chart-example-1"
version = "1.0.0"
description = "Scatter chart that toggles between random spots and a Flutter-logo point pattern on tap."
requires-python = ">=3.10"
keywords = ["charts", "scatter-chart", "flet"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet", "flet-charts"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Charts/ScatterChart"]

[tool.flet.metadata]
title = "Example 1"
controls = ["SafeArea", "ScatterChart"]
layout_pattern = "single-chart"
complexity = "basic"
features = ["chart visualization"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
