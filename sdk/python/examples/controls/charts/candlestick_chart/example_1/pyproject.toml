[project]
name = "charts-candlestick-chart-example-1"
version = "1.0.0"
description = "Candlestick chart visualizing weekly OHLC data with labeled axes and event-driven tooltips."
requires-python = ">=3.10"
keywords = ["charts", "candlestick-chart", "flet"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet", "flet-charts"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Charts/CandlestickChart"]

[tool.flet.metadata]
title = "Example 1"
controls = ["SafeArea", "CandlestickChart"]
layout_pattern = "single-chart"
complexity = "basic"
features = ["chart visualization"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
