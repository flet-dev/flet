[project]
name = "charts-matplotlib-chart-handle-events"
version = "1.0.0"
description = "Matplotlib chart demonstrating pick and keyboard events to inspect selected data points."
requires-python = ">=3.10"
keywords = ["charts", "matplotlib-chart", "flet"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet", "flet-charts", "matplotlib", "numpy"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Charts/MatplotlibChart"]

[tool.flet.metadata]
title = "Handle Events"
controls = ["SafeArea", "MatplotlibChart"]
layout_pattern = "single-chart"
complexity = "basic"
features = ["event handling", "save to file"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
