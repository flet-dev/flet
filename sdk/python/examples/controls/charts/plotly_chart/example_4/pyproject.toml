[project]
name = "charts-plotly-chart-example-4"
version = "1.0.0"
description = "Plotly grouped box plot comparing moisture distributions across categories."
requires-python = ">=3.10"
keywords = ["charts", "plotly-chart", "flet"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet", "flet-charts", "plotly"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Charts/PlotlyChart"]

[tool.flet.metadata]
title = "Example 4"
controls = ["SafeArea", "PlotlyChart"]
layout_pattern = "single-chart"
complexity = "basic"
features = ["chart visualization"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
