[project]
name = "charts-line-chart-dashboard-declarative"
version = "1.0.0"
description = "Dashboard Declarative example for line chart."
requires-python = ">=3.10"
keywords = ["charts", "line-chart", "flet"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet", "flet-charts"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Charts/LineChart"]

[tool.flet.metadata]
title = "Dashboard Declarative"
controls = ["SafeArea", "LineChart"]
layout_pattern = "single-chart"
complexity = "basic"
features = ["chart visualization"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
