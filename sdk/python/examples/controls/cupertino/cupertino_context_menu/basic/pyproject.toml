[project]
name = "cupertino-context-menu-basic"
version = "1.0.0"
description = "Opens a CupertinoContextMenu on image long-press with default and destructive actions."
requires-python = ">=3.10"
keywords = ["cupertino", "context menu", "image", "actions", "long press"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Input/CupertinoContextMenu"]

[tool.flet.metadata]
title = "Basic"
controls = ["SafeArea", "CupertinoContextMenu", "CupertinoContextMenuAction", "Image"]
layout_pattern = "single-panel"
complexity = "basic"
features = ["context menu actions", "destructive action", "haptic feedback"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
