[project]
name = "cupertino-filled-button-basic"
version = "1.0.0"
description = "Renders a CupertinoFilledButton with click opacity and click callback behavior."
requires-python = ">=3.10"
keywords = ["cupertino", "filled button", "button", "input"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Buttons/CupertinoFilledButton"]

[tool.flet.metadata]
title = "Basic"
controls = ["SafeArea", "CupertinoFilledButton", "Text"]
layout_pattern = "single-panel"
complexity = "basic"
features = ["custom click opacity", "button click callback"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
