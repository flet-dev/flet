[project]
name = "cupertino-app-bar-basic"
version = "1.0.0"
description = "Displays a CupertinoAppBar with custom leading and trailing icons and light theme styling."
requires-python = ">=3.10"
keywords = ["cupertino", "app bar", "navigation", "toolbar"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Navigation/CupertinoAppBar"]

[tool.flet.metadata]
title = "Basic"
controls = ["CupertinoAppBar", "Icon", "Text", "SafeArea"]
layout_pattern = "toolbar-actions"
complexity = "basic"
features = ["custom app bar colors", "leading and trailing icons"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
