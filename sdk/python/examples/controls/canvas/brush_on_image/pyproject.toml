[project]
name = "canvas-brush-on-image"
version = "1.0.0"
description = "Draw free-hand strokes over an image using Canvas."
requires-python = ">=3.10"
keywords = ["canvas", "brush", "image", "gesture", "overlay"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Displays/Canvas"]

[tool.flet.metadata]
title = "Brush on image"
controls = ["SafeArea", "Container", "Stack", "Image", "Canvas", "GestureDetector", "Line"]
layout_pattern = "overlay"
complexity = "basic"
features = ["drawing on image", "pan gesture handling"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
