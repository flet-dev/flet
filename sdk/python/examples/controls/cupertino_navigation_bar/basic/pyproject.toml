[project]
name = "cupertino-navigation-bar-basic"
version = "1.0.0"
description = "Shows a CupertinoNavigationBar with three destinations and selected tab callback logging."
requires-python = ">=3.10"
keywords = ["cupertino", "navigation bar", "tabs", "destinations"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Navigation/CupertinoNavigationBar"]

[tool.flet.metadata]
title = "Basic"
controls = ["CupertinoNavigationBar", "NavigationBarDestination", "SafeArea", "Text"]
layout_pattern = "tabbed-navigation"
complexity = "basic"
features = ["bottom navigation", "destination selection callback", "active and inactive colors"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
