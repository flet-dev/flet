[project]
name = "data-table-handling-events"
version = "1.0.0"
description = "Handles DataTable row selection and column sort events with visual table state updates."
requires-python = ">=3.10"
keywords = ["data table", "events", "row selection", "sorting"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Layout/DataTable"]

[tool.flet.metadata]
title = "Handling events"
controls = ["SafeArea", "DataTable", "DataColumn", "DataRow", "DataCell", "Text"]
layout_pattern = "table-view"
complexity = "basic"
features = ["row selection callback", "column sort callback", "table state updates"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
