[project]
name = "charts-pie-chart-with-icon-badges"
version = "1.0.0"
description = "Pie chart with icon badges and animated section highlighting based on pointer events."
requires-python = ">=3.10"
keywords = ["charts", "pie-chart", "flet"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet", "flet-charts"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Charts/PieChart"]

[tool.flet.metadata]
title = "Pie chart with icon badges"
controls = ["SafeArea", "PieChart"]
layout_pattern = "single-chart"
complexity = "basic"
features = ["chart visualization"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
