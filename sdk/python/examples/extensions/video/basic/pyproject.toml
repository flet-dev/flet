[project]
name = "video-basic"
version = "1.0.0"
description = "Plays a single video using the flet-video player."
requires-python = ">=3.10"
keywords = ["video", "media", "player", "basic"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet", "flet-video"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Media/Video"]

[tool.flet.metadata]
title = "Basic Video"
controls = ["SafeArea", "Video"]
layout_pattern = "single-panel"
complexity = "basic"
features = ["video playback", "autoplay"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
