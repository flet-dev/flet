[project]
name = "video-playback"
version = "1.0.0"
description = "Control video playback: play, pause, stop, seek, and inspect status."
requires-python = ">=3.10"
keywords = ["video", "playback", "play", "pause", "seek"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet", "flet-video"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Media/Video"]

[tool.flet.metadata]
title = "Playback Controls"
description = "Drive playback programmatically with methods like [`play()`][flet_video.Video.play], [`pause()`][flet_video.Video.pause], [`stop()`][flet_video.Video.stop], [`seek()`][flet_video.Video.seek], [`next()`][flet_video.Video.next], and [`previous()`][flet_video.Video.previous], and inspect status with methods like [`is_playing()`][flet_video.Video.is_playing], [`get_current_position()`][flet_video.Video.get_current_position], and [`get_duration()`][flet_video.Video.get_duration]."
controls = ["SafeArea", "Column", "Row", "Button", "Text", "Video"]
layout_pattern = "dashboard"
complexity = "basic"
features = ["play/pause/stop", "seek", "status inspection"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
