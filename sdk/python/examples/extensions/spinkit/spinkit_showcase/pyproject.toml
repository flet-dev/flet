[project]
name = "spinkit-showcase"
version = "1.0.0"
description = "Showcases all 30 SpinKit loading animations."
requires-python = ">=3.10"
keywords = ["spinkit", "loading", "spinner", "animation", "indicator"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet", "flet-spinkit"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Animation/SpinKit"]

[tool.flet.metadata]
title = "SpinKit Showcase"
controls = [
    "SafeArea", "Column", "Row", "GridView", "Container", "Text",
    "Slider", "SegmentedButton", "ButtonSegment",
    "SpinKitRotatingCircle", "SpinKitWave", "SpinKitThreeBounce",
    "SpinKitFadingCircle", "SpinKitPulse", "SpinKitRing",
    "SpinKitRipple", "SpinKitDualRing", "SpinKitCubeGrid",
    "SpinKitFoldingCube", "SpinKitHourGlass", "SpinKitPianoWave",
]
layout_pattern = "grid"
complexity = "intermediate"
features = ["spinner grid", "color selection", "size slider", "all 31 spinner types"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"

# Animated SpinKit boot screen, shown while the packaged app starts up.
# Provided by the flet-spinkit extension (see its src/flutter/.../boot_screen.dart).
[tool.flet.boot_screen]
name = "spinkit"

[tool.flet.boot_screen.spinkit]
spinner = "WanderingCubes"
spinner_color_light = "#7c4dff"
spinner_color_dark = "#b388ff"
spinner_size = 60
bgcolor_light = "#ffffff"
bgcolor_dark = "#0d0d12"
prepare_message = "Preparing your app…"
startup_message = "Starting up…"
