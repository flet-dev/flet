[project]
name = "spinkit-showcase"
version = "1.0.0"
description = "Displays a SpinKitRotatingCircle loading animation."
requires-python = ">=3.10"
keywords = ["spinkit", "loading", "spinner", "animation", "indicator"]
authors = [{ name = "Flet team", email = "hello@flet.dev" }]
dependencies = ["flet", "flet-spinkit"]

[dependency-groups]
dev = ["flet-cli", "flet-desktop", "flet-web"]

[tool.flet.gallery]
categories = ["Animation/SpinKit"]

[tool.flet.metadata]
title = "SpinKit Showcase"
controls = [
    "SafeArea", "Column", "Row", "GridView", "Container", "Text",
    "Slider", "SegmentedButton", "ButtonSegment",
    "SpinKitRotatingCircle", "SpinKitWave", "SpinKitThreeBounce",
    "SpinKitFadingCircle", "SpinKitPulse", "SpinKitRing",
    "SpinKitRipple", "SpinKitDualRing", "SpinKitCubeGrid",
    "SpinKitFoldingCube", "SpinKitHourGlass", "SpinKitPianoWave",
]
layout_pattern = "grid"
complexity = "intermediate"
features = ["spinner grid", "color selection", "size slider", "all 31 spinner types"]

[tool.flet]
org = "dev.flet"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"
