name: Release PR Changelog

on:
  pull_request:
    branches:
      - 'release/**'
    paths-ignore:
      - 'website/**'
      - 'tools/**'
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review

jobs:
  changelog_record:
    name: Require changelog record
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify root changelog update
        shell: bash
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"

          changed_files=$(git diff --name-only "$base_sha...$head_sha")

          if ! grep -qx 'CHANGELOG.md' <<<"$changed_files"; then
            echo "PRs targeting release branches must update the root CHANGELOG.md."
            exit 1
          fi

          added_records=$(git diff --unified=0 "$base_sha...$head_sha" -- CHANGELOG.md | grep -E '^\+\* ' || true)

          if [[ -z "$added_records" ]]; then
            echo "PRs targeting release branches must add at least one new changelog record to CHANGELOG.md."
            exit 1
          fi
