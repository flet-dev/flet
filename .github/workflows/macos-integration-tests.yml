name: macOS Integration Tests

on:
  push:
    tags-ignore:
      - '**'
    branches-ignore:
      - main
    paths:
      - '.github/workflows/macos-integration-tests.yml'
      - 'sdk/python/packages/flet/src/**'
      - 'sdk/python/packages/flet/integration_tests/**'
      - 'packages/flet/**'
      - 'client/**'
      - '.fvmrc'
  pull_request:
    paths:
      - '.github/workflows/macos-integration-tests.yml'
      - 'sdk/python/packages/flet/src/**'
      - 'sdk/python/packages/flet/integration_tests/**'
      - 'packages/flet/**'
      - 'client/**'
      - '.fvmrc'
  workflow_dispatch:

# Ensure only one run per branch (PR or push), cancel older ones
concurrency:
  group: macos-integration-tests-${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  FLET_TEST_SCREENSHOTS_PIXEL_RATIO: "2.0"
  FLET_TEST_SCREENSHOTS_SIMILARITY_THRESHOLD: "99.0"
  FLET_TEST_DISABLE_FVM: "1"
  UV_PYTHON: "3.13"

jobs:
  test-macos:
    runs-on: macos-26
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        suite:
        - apps
        - examples/apps
        - examples/controls/core
        - examples/controls/cupertino
        - examples/controls/material
        - examples/extensions
        - controls/core
        - controls/cupertino
        - controls/material
        - controls/services
        - controls/theme
        - extensions

    name: ${{ matrix.suite }} Integration Tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: ${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Setup Flutter
        uses: kuhnroyal/flutter-fvm-config-action/setup@c378498f1d1962d33039c3989411093ef8a17b2c # v3.3
        with:
          path: '.fvmrc'
          cache: ${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Show tool versions
        run: |
          uv --version && uv run python --version && pod --version && flutter --version

      - name: Show macOS display resolution
        run: |
          system_profiler SPDisplaysDataType | grep Resolution || true
          screencapture /tmp/screen.png
          sips -g pixelWidth -g pixelHeight /tmp/screen.png

      - name: Run integration tests (${{ matrix.suite }})
        working-directory: sdk/python
        run: |
          uv run pytest -s -o log_cli=true -o log_cli_level=INFO packages/flet/integration_tests/${{ matrix.suite }}

      - name: Prepare failure screenshots
        if: failure()
        run: |
          SAFE_SUITE="${MATRIX_SUITE//\//-}"
          echo "SAFE_SUITE=$SAFE_SUITE" >> $GITHUB_ENV
        env:
          MATRIX_SUITE: ${{ matrix.suite }}

      - name: Upload artifact
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-test-failures-macos-${{ env.SAFE_SUITE }}
          path: sdk/python/packages/flet/integration_tests/${{ matrix.suite }}/**/*_actual.png
          if-no-files-found: ignore
