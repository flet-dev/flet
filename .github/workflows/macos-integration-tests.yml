name: macOS Integration Tests

on:
  push:
    branches-ignore:
      - main
    paths:
      - '.github/workflows/macos-integration-tests.yml'
      - 'sdk/python/packages/flet/src/**'
      - 'sdk/python/packages/flet/integration_tests/**'
      - 'packages/flet/**'
      - 'client/**'
      - '.fvmrc'
  pull_request:
    paths:
      - '.github/workflows/macos-integration-tests.yml'
      - 'sdk/python/packages/flet/src/**'
      - 'sdk/python/packages/flet/integration_tests/**'
      - 'packages/flet/**'
      - 'client/**'
      - '.fvmrc'
  workflow_dispatch:

# Ensure only one run per branch (PR or push), cancel older ones
concurrency:
  group: macos-integration-tests-${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  FLET_TEST_SCREENSHOTS_PIXEL_RATIO: "2.0"
  FLET_TEST_SCREENSHOTS_SIMILARITY_THRESHOLD: "99.0"
  FLET_TEST_DISABLE_FVM: "1"
  UV_PYTHON: "3.13"

jobs:
  test-macos:
    runs-on: macos-26
    name: Integration Tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Flutter
        uses: kuhnroyal/flutter-fvm-config-action/setup@v3
        with:
          path: '.fvmrc'
          cache: true

      - name: Show tool versions
        run: |
          uv --version && uv run python --version && pod --version && flutter --version

      - name: Run integration tests
        working-directory: sdk/python
        run: |
          uv run pytest -s -o log_cli=true -o log_cli_level=INFO packages/flet/integration_tests/examples/material/test_text_button.py

      - name: Upload artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-failures-macos
          path: sdk/python/packages/flet/integration_tests/examples/material/**/*_actual.png
          if-no-files-found: ignore
